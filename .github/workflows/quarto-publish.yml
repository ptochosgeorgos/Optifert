name: Quarto CI/CD (R & Render)

on:
  push:
    branches:
      - main
      - master  # Je nachdem, wie Ihr Hauptbranch heißt

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, damit der Bot die Webseite pushen darf

    steps:
      - name: 1. Repository klonen
        uses: actions/checkout@v4

      - name: 2. R installieren
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Beschleunigt die Paket-Installation massiv

      - name: 3. R-Pakete installieren
        run: |
          Rscript -e 'install.packages(c("tidyverse", "lubridate", "readxl", "rrcov", "gridExtra"), repos = "https://packagemanager.posit.co/cran/latest")'

      - name: 4. Quarto installieren
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 5. Projekt rendern und auf GitHub Pages publizieren
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
