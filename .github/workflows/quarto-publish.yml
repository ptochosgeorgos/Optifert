name: Quarto CI/CD (R & Render)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 1. Repository klonen
        uses: actions/checkout@v4

      - name: 2. R installieren
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: 3. System-Bibliotheken und R-Pakete installieren
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::lubridate
            any::readxl
            any::rrcov
            any::gridExtra

      - name: 4. Quarto installieren
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 5. Projekt rendern und auf GitHub Pages publizieren
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
